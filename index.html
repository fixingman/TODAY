<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TODAY App</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background-color: #f4f4f4;
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
    }
    header {
        background: #007bff;
        color: white;
        width: 100%;
        padding: 1rem;
        text-align: center;
    }
    #date {
        margin: 2rem;
        font-size: 2rem;
        padding: 1rem;
        border: 1px solid #ccc;
        border-radius: 5px;
        background: white;
    }
</style>
</head>
<body>
    <header>
        <h1>TODAY App</h1>
    </header>
    <div id="date"></div>
    <script>
        function updateDate() {
            const now = new Date();
            document.getElementById('date').innerText = now.toUTCString();
        }
        setInterval(updateDate, 1000);
        updateDate();
    </script>
</body>
</html>
